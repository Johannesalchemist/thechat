<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyxa — Portal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  width: 100vw; height: 100vh;
  font-family: 'Georgia', serif;
  background: #06060f;
}

canvas#portal-canvas {
  position: fixed; inset: 0;
  width: 100vw; height: 100vh;
}

#portal-ui {
  position: fixed; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  pointer-events: none;
  padding: 2rem;
  text-align: center;
}

#glyph {
  font-size: 3.2rem;
  opacity: 0;
  transition: opacity 2s ease;
  margin-bottom: 2.2rem;
  filter: drop-shadow(0 0 20px var(--accent));
}

#world-name {
  font-size: clamp(24px, 5vw, 52px);
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0);
  text-transform: uppercase;
  transition: color 3s ease;
  text-shadow: 0 0 80px var(--accent);
  font-weight: normal;
}

#visitor-greeting {
  margin-top: 1.4rem;
  font-size: clamp(13px, 1.5vw, 17px);
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0);
  font-style: italic;
  transition: color 2.5s ease;
  opacity: 0.7;
}

#inscription {
  margin-top: 3rem;
  max-width: 520px;
  font-size: clamp(13px, 1.5vw, 17px);
  line-height: 1.9;
  letter-spacing: 0.06em;
  color: rgba(255,255,255,0);
  transition: color 3s ease;
  text-shadow: 0 0 30px var(--accent);
}

#atmosphere {
  margin-top: 2rem;
  display: flex;
  gap: 1.8rem;
  justify-content: center;
  opacity: 0;
  transition: opacity 2.5s ease;
}

.atm-word {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.5;
}

#enter-world {
  margin-top: 3.5rem;
  background: none;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  padding: 0.75rem 2.5rem;
  cursor: pointer;
  font-family: 'Georgia', serif;
  border-radius: 1px;
  opacity: 0;
  transition: opacity 2s ease, box-shadow 0.4s, background 0.4s;
  pointer-events: none;
}
#enter-world.on {
  opacity: 1;
  pointer-events: all;
}
#enter-world:hover {
  background: color-mix(in srgb, var(--accent) 10%, transparent);
  box-shadow: 0 0 40px color-mix(in srgb, var(--accent) 30%, transparent);
}

#loading {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #06060f;
  z-index: 50;
  transition: opacity 1.5s ease;
}
#loading-text {
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  animation: fade 2s ease-in-out infinite;
}
@keyframes fade { 0%,100%{opacity:0.4} 50%{opacity:1} }
</style>
</head>
<body>

<div id="loading"><div id="loading-text">shaping your world…</div></div>

<canvas id="portal-canvas"></canvas>

<div id="portal-ui">
  <div id="glyph"></div>
  <div id="world-name"></div>
  <div id="visitor-greeting"></div>
  <div id="inscription"></div>
  <div id="atmosphere"></div>
  <button id="enter-world">enter</button>
</div>

<script>
// ── Load world state ──────────────────────────────────────────────────────────
const store = (() => {
  try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); return localStorage; }
  catch { return sessionStorage; }
})();

const state = (() => {
  try { return JSON.parse(store.getItem('nyxa_world_state_v1')); } catch { return null; }
})();

const guestId    = store.getItem('nyxa_guest_id') || '';
const visitorName = state?.visitor_name || 'traveller';
const worldName   = state?.world_name   || 'The Unnamed World';
const worldSeed   = state?.world_seed   || '';
const painSeed    = state?.pain_seed    || '';

// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('portal-canvas');
const ctx    = canvas.getContext('2d');
let W, H, cx, cy;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
window.addEventListener('resize', resize);

// ── Portal particle system ─────────────────────────────────────────────────────
let design = null;
let particles = [];
let bgFrom = [6, 6, 15];
let bgTo   = [15, 6, 30];
let accentRgb = [196, 181, 253];

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function buildParticles() {
  particles = [];
  const n = Math.floor(W * H / 2200);
  const [pr, pg, pb] = accentRgb;
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 0.35 + 0.05;
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: Math.random() * 1.4 + 0.2,
      a: Math.random() * 0.4 + 0.05,
      pr, pg, pb,
      drift: Math.random() * 0.001 - 0.0005
    });
  }
}

let tick = 0;
function frame() {
  ctx.clearRect(0,0,W,H);

  // Deep background gradient
  const bg = ctx.createRadialGradient(cx, cy*0.7, 0, cx, cy, Math.max(W,H)*0.75);
  const [fr, fg, fb] = bgFrom;
  const [tr, tg, tb] = bgTo;
  bg.addColorStop(0, `rgb(${fr+20},${fg+15},${fb+25})`);
  bg.addColorStop(0.5,`rgb(${fr+8},${fg+6},${fb+12})`);
  bg.addColorStop(1,  `rgb(${tr},${tg},${tb})`);
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Central glow — the portal mouth
  const [ar, ag, ab] = accentRgb;
  const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W,H) * 0.38);
  cg.addColorStop(0,   `rgba(${ar},${ag},${ab},0.12)`);
  cg.addColorStop(0.4, `rgba(${ar},${ag},${ab},0.05)`);
  cg.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, Math.min(W,H)*0.38, 0, Math.PI*2);
  ctx.fillStyle = cg;
  ctx.fill();

  // Portal ring
  tick += 0.006;
  const ringR = Math.min(W,H) * 0.18 + Math.sin(tick) * 4;
  ctx.beginPath();
  ctx.arc(cx, cy, ringR, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(${ar},${ag},${ab},${0.12 + Math.sin(tick*1.3)*0.04})`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, ringR * 1.6, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(${ar},${ag},${ab},0.05)`;
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Drifting particles — drawn toward center
  for (const p of particles) {
    const dx = cx - p.x, dy = cy - p.y;
    const dist = Math.hypot(dx, dy);
    // Slow gravitational drift toward center
    p.vx += dx / dist * 0.003;
    p.vy += dy / dist * 0.003;
    // Apply drift rotation
    const vl = Math.hypot(p.vx, p.vy);
    if (vl > 0.6) { p.vx *= 0.6/vl; p.vy *= 0.6/vl; }

    p.x += p.vx;
    p.y += p.vy;

    // Respawn if too close to center or off-screen
    if (dist < 15 || p.x<0||p.x>W||p.y<0||p.y>H) {
      const a = Math.random() * Math.PI*2;
      const r = Math.random() * Math.min(W,H) * 0.5 + Math.min(W,H)*0.1;
      p.x = cx + Math.cos(a)*r;
      p.y = cy + Math.sin(a)*r;
      p.vx = 0; p.vy = 0;
    }

    const fade = Math.min(1, dist / 80) * p.a;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${p.pr},${p.pg},${p.pb},${fade})`;
    ctx.fill();
  }

  requestAnimationFrame(frame);
}

// ── Apply design manifest ─────────────────────────────────────────────────────
function applyDesign(d) {
  design = d;
  const root = document.documentElement;

  try { accentRgb = hexToRgb(d.accent); } catch {}
  try { bgFrom    = hexToRgb(d.bg_from); } catch {}
  try { bgTo      = hexToRgb(d.bg_to); } catch {}

  root.style.setProperty('--accent', d.accent || '#c4b5fd');

  buildParticles();

  // Reveal UI
  const glyphEl   = document.getElementById('glyph');
  const nameEl    = document.getElementById('world-name');
  const greetEl   = document.getElementById('visitor-greeting');
  const inscEl    = document.getElementById('inscription');
  const atmEl     = document.getElementById('atmosphere');
  const enterEl   = document.getElementById('enter-world');

  glyphEl.textContent  = d.world_glyph || '◈';
  nameEl.textContent   = worldName.toUpperCase();
  greetEl.textContent  = visitorName;
  inscEl.textContent   = d.watcher_inscription || '';
  enterEl.textContent  = d.entry_word || 'descend';

  // Atmosphere words
  if (d.atmosphere?.length) {
    atmEl.innerHTML = d.atmosphere.map(w => `<span class="atm-word">${w}</span>`).join('');
  }

  // Staggered reveals
  setTimeout(() => { glyphEl.style.opacity = '0.85'; }, 200);
  setTimeout(() => { nameEl.style.color = 'rgba(255,255,255,0.92)'; }, 600);
  setTimeout(() => { greetEl.style.color = 'rgba(255,255,255,0.55)'; }, 1200);
  setTimeout(() => { inscEl.style.color = 'rgba(255,255,255,0.72)'; }, 2000);
  setTimeout(() => { atmEl.style.opacity = '1'; }, 2800);
  setTimeout(() => { enterEl.classList.add('on'); }, 4000);

  // Hide loading
  const loadEl = document.getElementById('loading');
  loadEl.style.opacity = '0';
  setTimeout(() => { loadEl.style.display = 'none'; }, 1600);
}

// ── Fetch design from server ──────────────────────────────────────────────────
async function loadPortalDesign() {
  // Use cached design if available (fast path for returning guests)
  if (state?.portal_design) {
    applyDesign(state.portal_design);
    return;
  }
  if (!state) {
    // Fallback: generic design
    applyDesign({
      bg_from: '#0a0614', bg_to: '#060a14',
      accent: '#c4b5fd', particle_color: '#c4b5fd',
      atmosphere: ['threshold','weight','becoming'],
      visual_metaphor: 'a doorway at the edge of deep water',
      watcher_inscription: 'You arrived. That is already courage.',
      world_glyph: '◈', entry_word: 'descend'
    });
    return;
  }

  try {
    const r = await fetch('/api/watcher/portal-design', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        visitor_name: visitorName,
        world_name:   worldName,
        world_seed:   worldSeed,
        pain_seed:    painSeed
      })
    }).then(r => r.json());

    if (r.design) applyDesign(r.design);
    else throw new Error('no design');
  } catch {
    applyDesign({
      bg_from: '#0a0614', bg_to: '#06100a',
      accent: '#c4b5fd', particle_color: '#c4b5fd',
      atmosphere: ['threshold','weight','becoming'],
      visual_metaphor: 'a doorway at the edge of deep water',
      watcher_inscription: 'You arrived. That is already courage.',
      world_glyph: '◈', entry_word: 'descend'
    });
  }
}

// Enter button → The Room
document.getElementById('enter-world').addEventListener('click', () => {
  window.location.href = '/holding';
});

// ── Boot ──────────────────────────────────────────────────────────────────────
resize();
buildParticles();
frame();
loadPortalDesign();
</script>
</body>
</html>
