<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Suno + Claude — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e8e8ed;
      padding: 24px;
      min-width: 360px;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #d4a574, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input[type="password"], input[type="text"], select {
      width: 100%;
      background: #12121a;
      color: #e8e8ed;
      border: 1px solid #2e2e3e;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus, select:focus {
      border-color: #d4a574;
    }
    .hint {
      font-size: 11px;
      color: #666;
      margin-top: -12px;
      margin-bottom: 16px;
    }
    button {
      background: linear-gradient(135deg, #d4a574, #c4956a);
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      filter: brightness(1.1);
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #4ade80;
    }
    .status.error {
      color: #f87171;
    }
  </style>
</head>
<body>
  <h1>Suno + Claude Settings</h1>

  <label for="api-key">Anthropic API Key</label>
  <input type="password" id="api-key" placeholder="sk-ant-...">
  <p class="hint">Your key is stored locally in Chrome and only sent to api.anthropic.com</p>

  <label for="model-select">Claude Model</label>
  <select id="model-select">
    <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (fast)</option>
    <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (fastest)</option>
    <option value="claude-opus-4-6">Claude Opus 4.6 (best)</option>
  </select>

  <button id="btn-save">Save Settings</button>
  <div id="status" class="status"></div>

  <script>
    const apiKeyInput = document.getElementById('api-key');
    const modelSelect = document.getElementById('model-select');
    const statusEl = document.getElementById('status');

    // Load
    chrome.storage.sync.get(['anthropic_api_key', 'claude_model'], (data) => {
      if (data.anthropic_api_key) apiKeyInput.value = data.anthropic_api_key;
      if (data.claude_model) modelSelect.value = data.claude_model;
    });

    // Save
    document.getElementById('btn-save').addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      const model = modelSelect.value;

      if (!key) {
        statusEl.textContent = 'API key is required';
        statusEl.className = 'status error';
        return;
      }

      chrome.storage.sync.set({
        anthropic_api_key: key,
        claude_model: model
      }, () => {
        statusEl.textContent = 'Settings saved!';
        statusEl.className = 'status';
        setTimeout(() => { statusEl.textContent = ''; }, 2000);
      });
    });
  </script>
</body>
</html>
